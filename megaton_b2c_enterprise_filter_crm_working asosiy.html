<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEGATON B2C Nazorat Markazi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{--bg:#f7f9fc;--card:#fff;--card2:#f8fafc;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#4ea4ff;--orange:#f09020;--green:#16a34a;--red:#dc2626;--yellow:#f59e0b;--purple:#7c3aed;--shadow:0 16px 40px rgba(15,23,42,.08);--side:#0f172a;--sideText:#d1d5db}
body.dark{--bg:#090b12;--card:#111827;--card2:#0f172a;--text:#f9fafb;--muted:#9ca3af;--line:#253044;--shadow:0 18px 48px rgba(0,0,0,.45);--side:#020617;--sideText:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font-family:inherit}.hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 15%,rgba(240,144,32,.18),transparent 28%),linear-gradient(135deg,#0f172a,#111827)}
.login-card{width:min(440px,94vw);background:var(--card);border:1px solid var(--line);border-radius:28px;padding:32px;box-shadow:0 30px 90px rgba(0,0,0,.35)}.brand{display:flex;align-items:center;gap:14px;margin-bottom:22px}.brand img{width:54px;height:54px;object-fit:contain}.brand h1{font-size:20px;margin:0}.brand p{margin:5px 0 0;color:var(--muted);font-size:13px}
.field{display:flex;flex-direction:column;gap:7px;margin:10px 0}.field label{font-size:12px;font-weight:800;color:var(--muted)}.field input,.field select,.field textarea{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:14px;padding:12px 13px;outline:none}.field textarea{min-height:88px;resize:vertical}
.btn{border:0;border-radius:13px;padding:11px 14px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 10px 22px rgba(78,164,255,.22)}.btn:hover{transform:translateY(-1px)}.btn.light{background:var(--card);color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.orange{background:var(--orange)}.btn.small{padding:8px 10px;font-size:12px;border-radius:10px}
.app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}.sidebar{background:var(--side);color:#fff;padding:20px;position:sticky;top:0;height:100vh;overflow:auto}.side-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}.side-logo{width:46px;height:46px;object-fit:contain;filter:none}body.dark .side-logo{filter:brightness(0) invert(1)}.side-head h2{margin:0;font-size:15px;letter-spacing:.04em}.side-head span{font-size:11px;color:#94a3b8}.nav{display:flex;flex-direction:column;gap:7px}.nav button{width:100%;text-align:left;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;background:transparent;color:var(--sideText);cursor:pointer;font-weight:700}.nav button.active,.nav button:hover{background:rgba(78,164,255,.14);border-color:rgba(78,164,255,.35);color:#fff}.main{padding:24px;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.topbar h1{font-size:25px;margin:0}.topbar p{margin:6px 0 0;color:var(--muted)}.top-actions{display:flex;gap:10px;align-items:center}.userbox{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:10px 12px;box-shadow:var(--shadow)}.avatar{width:38px;height:38px;border-radius:50%;background:rgba(78,164,255,.14);color:var(--blue);display:grid;place-items:center;font-weight:900}.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#111827;cursor:pointer}body.dark .theme-toggle{background:#fff}
.section{display:none}.section.active{display:block}.grid{display:grid;gap:16px}.grid.kpi{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.kpi-card{position:relative;overflow:hidden}.kpi-card:after{content:"";position:absolute;right:-28px;top:-28px;width:92px;height:92px;background:rgba(78,164,255,.11);border-radius:50%}.kpi-label{font-size:12px;color:var(--muted);font-weight:800}.kpi-value{font-size:26px;font-weight:900;margin-top:8px}.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:16px}.filters{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:var(--shadow)}.filter-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:end}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick button{font-size:12px;border-radius:999px;padding:7px 10px}
.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:var(--card2);color:var(--muted);font-size:12px;font-weight:900}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.b-green{background:#dcfce7;color:#166534}.b-red{background:#fee2e2;color:#991b1b}.b-blue{background:#dbeafe;color:#1e40af}.b-orange{background:#ffedd5;color:#9a3412}.b-purple{background:#ede9fe;color:#5b21b6}body.dark .b-green{background:rgba(22,163,74,.2);color:#86efac}body.dark .b-red{background:rgba(220,38,38,.2);color:#fca5a5}body.dark .b-blue{background:rgba(37,99,235,.25);color:#93c5fd}body.dark .b-orange{background:rgba(240,144,32,.2);color:#fdba74}body.dark .b-purple{background:rgba(124,58,237,.24);color:#c4b5fd}.hint{font-size:12px;color:var(--muted);line-height:1.45}.progress{height:9px;background:var(--card2);border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px}.map-box{height:630px;border-radius:22px;overflow:hidden;border:1px solid var(--line);position:relative}#mapCanvas{height:100%;width:100%}.map-panel{position:absolute;right:14px;top:14px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;z-index:600;width:320px;box-shadow:var(--shadow)}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px}.leaflet-popup-content{font-family:Inter,Arial,sans-serif}.map-marker{background:transparent;border:0}.map-marker span{display:grid;place-items:center;width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 8px 18px rgba(0,0,0,.28);font-size:13px}.modal{position:fixed;inset:0;background:rgba(2,6,23,.58);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}.modal.show{display:flex}.modal-card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 90px rgba(0,0,0,.45);width:min(960px,96vw);max-height:90vh;overflow:auto;padding:20px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.full{grid-column:1/-1}canvas{max-height:330px}.empty{padding:28px;text-align:center;color:var(--muted)}
@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.grid.kpi,.grid.two,.grid.three,.filter-grid,.form-grid{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}.map-panel{position:relative;right:auto;top:auto;width:auto;margin:12px}.map-box{height:720px}}
</style>
</head>

function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[]}function repaintCharts(){let id=activePage();render(id)}
function defaultRange(){return {from:'2026-06-01',to:'2026-06-30',preset:'month',manager:'all',channel:'all',region:'all'}}
let filters=defaultRange();
function filterUI(scope='global'){let managers=['all',...Array.from(new Set(db.reports.map(r=>r.manager).filter(Boolean)))];let chans=['all',...Array.from(new Set(db.reports.map(r=>r.channel).filter(Boolean)))];let regs=['all',...Array.from(new Set(db.reports.map(r=>r.region).filter(Boolean)))];return `<div class="filters"><div class="filter-grid"><div class="field"><label>Davr</label><select onchange="setPreset(this.value)"><option value="month" ${filters.preset==='month'?'selected':''}>Joriy oy</option><option value="today" ${filters.preset==='today'?'selected':''}>Tanlangan kun</option><option value="7" ${filters.preset==='7'?'selected':''}>Oxirgi 7 kun</option><option value="30" ${filters.preset==='30'?'selected':''}>Oxirgi 30 kun</option><option value="custom" ${filters.preset==='custom'?'selected':''}>Sana oralig‘i</option></select></div><div class="field"><label>Boshlanish</label><input type="date" value="${filters.from}" onchange="filters.from=this.value;filters.preset='custom';render(activePage())"></div><div class="field"><label>Tugash</label><input type="date" value="${filters.to}" onchange="filters.to=this.value;filters.preset='custom';render(activePage())"></div><div class="field"><label>Menejer</label><select onchange="filters.manager=this.value;render(activePage())" ${currentUser.role!=='admin'?'disabled':''}>${managers.map(m=>`<option value="${m}" ${filters.manager===m?'selected':''}>${m==='all'?'Barchasi':m}</option>`).join('')}</select></div><div class="field"><label>Kanal</label><select onchange="filters.channel=this.value;render(activePage())">${chans.map(c=>`<option value="${c}" ${filters.channel===c?'selected':''}>${c==='all'?'Barchasi':c}</option>`).join('')}</select></div><div class="field"><label>Hudud</label><select onchange="filters.region=this.value;render(activePage())">${regs.map(r=>`<option value="${r}" ${filters.region===r?'selected':''}>${r==='all'?'Barchasi':r}</option>`).join('')}</select></div></div><div class="quick"><button class="btn small light" onclick="setRange('2026-06-01','2026-06-30','month')">Iyun</button><button class="btn small light" onclick="setRange('2026-06-01','2026-06-07','custom')">1-7 Iyun</button><button class="btn small light" onclick="setRange('2026-06-08','2026-06-14','custom')">8-14 Iyun</button><button class="btn small light" onclick="setRange('2026-06-15','2026-06-21','custom')">15-21 Iyun</button><button class="btn small light" onclick="setRange('2026-06-22','2026-06-30','custom')">22-30 Iyun</button><button class="btn small orange" onclick="resetData()">Maʼlumotni qayta yuklash</button></div></div>`}
function setRange(f,t,p='custom'){filters.from=f;filters.to=t;filters.preset=p;render(activePage())}function setPreset(p){filters.preset=p;if(p==='month')setRange('2026-06-01','2026-06-30','month');else if(p==='7')setRange('2026-06-24','2026-06-30','7');else if(p==='30')setRange('2026-06-01','2026-06-30','30');else if(p==='today')setRange(filters.to,filters.to,'today');else render(activePage())}
function inRange(d){return d>=filters.from&&d<=filters.to}function visibleReports(){let arr=db.reports.filter(r=>inRange(r.date||r.reportDate));if(currentUser&&currentUser.role!=='admin')arr=arr.filter(r=>String(r.manager).toLowerCase()===String(currentUser.name).toLowerCase());if(filters.manager!=='all')arr=arr.filter(r=>r.manager===filters.manager);if(filters.channel!=='all')arr=arr.filter(r=>r.channel===filters.channel);if(filters.region!=='all')arr=arr.filter(r=>r.region===filters.region);return arr}
function agg(arr){let a={orders:0,totalM3:0,loadedOrders:0,loadedM3:0,lateOrders:0,lateM3:0,revenue:0,cash:0,bank:0,debt:0};arr.forEach(r=>{a.orders+=+r.totalOrders||0;a.totalM3+=+r.totalM3||0;a.loadedOrders+=+r.loadedOrders||0;a.loadedM3+=+r.loadedM3||0;a.lateOrders+=+r.lateOrders||0;a.lateM3+=+r.lateM3||0;a.revenue+=+r.revenue||0;a.cash+=+r.cash||0;a.bank+=+r.bank||0;a.debt+=+r.debt||0});a.onTime=a.orders?100*a.loadedOrders/a.orders:0;a.late=a.orders?100*a.lateOrders/a.orders:0;return a}
function group(arr,key){let m={};arr.forEach(r=>{let k=typeof key==='function'?key(r):r[key]||'-';m[k]=m[k]||[];m[k].push(r)});return m}function sumArr(arr,k){return arr.reduce((a,b)=>a+(+b[k]||0),0)}
function kpi(l,v,s,cls=''){return `<div class="card kpi-card ${cls}"><div class="kpi-label">${l}</div><div class="kpi-value">${v}</div><div class="kpi-sub">${s}</div></div>`}
function renderDashboard(){let arr=visibleReports(),a=agg(arr);dashboard.innerHTML=filterUI()+`<div class="grid kpi" style="margin-top:16px">${kpi('Jami buyurtmalar',fmt(a.orders)+' ta','Tanlangan davr')}${kpi('Jami m³',fmtM3(a.totalM3)+' m³','Barcha buyurtmalar')}${kpi('Yuklangan m³',fmtM3(a.loadedM3)+' m³',pct(a.onTime)+' o‘z vaqtida')}${kpi('Kechikkan yuklar',fmt(a.lateOrders)+' ta',fmtM3(a.lateM3)+' m³')}${kpi('Jami tushum',money(a.revenue),'Muvaffaqiyatli sotuv')}${kpi('Naqd tushum',money(a.cash),pct(a.revenue?100*a.cash/a.revenue:0))}${kpi('Bank tushum',money(a.bank),pct(a.revenue?100*a.bank/a.revenue:0))}${kpi('CRM muvaffaqiyatli',fmtM3(crmSuccess().m3)+' m³',money(crmSuccess().amount))}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Kunlik yuklangan m³</h3><canvas id="dashLine"></canvas></div><div class="card"><h3>Naqd / Bank</h3><canvas id="payPie"></canvas></div><div class="card"><h3>Kanal ulushi</h3><canvas id="channelPie"></canvas></div><div class="card"><h3>Top menejerlar</h3><canvas id="managerBar"></canvas></div></div>`;drawCoreCharts(arr,'dashLine','payPie','channelPie','managerBar')}
function chartColors(){return ['#4ea4ff','#16a34a','#f09020','#dc2626','#7c3aed','#f59e0b','#06b6d4','#84cc16']}
function newChart(id,type,labels,data,label=''){let c=document.getElementById(id);if(!c)return;charts.push(new Chart(c,{type,data:{labels,datasets:[{label,data,backgroundColor:chartColors(),borderColor:chartColors(),tension:.35,fill:type==='line'?false:true}]},options:{responsive:true,plugins:{legend:{display:type!=='bar'&&type!=='line'}},scales:type==='pie'||type==='doughnut'?{}:{y:{beginAtZero:true}}}}))}
function drawCoreCharts(arr,line,pay,chan,man){let byDate=group(arr,'date');let dates=Object.keys(byDate).sort();newChart(line,'line',dates,dates.map(d=>sumArr(byDate[d],'loadedM3')),'m³');let a=agg(arr);newChart(pay,'doughnut',['Naqd','Bank'],[a.cash,a.bank]);let byCh=group(arr,'channel');newChart(chan,'doughnut',Object.keys(byCh),Object.values(byCh).map(x=>sumArr(x,'loadedM3')));let byM=group(arr,'manager');let sorted=Object.entries(byM).sort((a,b)=>sumArr(b[1],'loadedM3')-sumArr(a[1],'loadedM3')).slice(0,8);newChart(man,'bar',sorted.map(x=>x[0]),sorted.map(x=>sumArr(x[1],'loadedM3')),'m³')}
function renderAnalytics(){let arr=visibleReports(),a=agg(arr);let byRegion=group(arr,'region'),byTransport=group(arr,'transport'),bySort=group(arr,'sort');analytics.innerHTML=filterUI()+`<div class="grid kpi" style="margin-top:16px">${kpi('Tahlil davri',filters.from+' → '+filters.to,'Filter barcha grafiklarda ishlaydi')}${kpi('Muvaffaqiyatli sotuv',fmtM3(a.loadedM3)+' m³',money(a.revenue))}${kpi('O‘z vaqtida',pct(a.onTime),fmt(a.loadedOrders)+' / '+fmt(a.orders)+' order')}${kpi('Kechikkan',pct(a.late),fmt(a.lateOrders)+' order')}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Kunlik tushum</h3><canvas id="revLine"></canvas></div><div class="card"><h3>Hududlar bo‘yicha m³</h3><canvas id="regionBar"></canvas></div><div class="card"><h3>Transport bo‘yicha</h3><canvas id="transportPie"></canvas></div><div class="card"><h3>Sort bo‘yicha</h3><canvas id="sortPie"></canvas></div></div><div class="card table-wrap" style="margin-top:16px"><h3>Kesimlar bo‘yicha umumiy jadval</h3>${summaryTable(arr)}</div>`;let byD=group(arr,'date'),dates=Object.keys(byD).sort();newChart('revLine','line',dates,dates.map(d=>sumArr(byD[d],'revenue')),'Tushum');newChart('regionBar','bar',Object.keys(byRegion),Object.values(byRegion).map(x=>sumArr(x,'loadedM3')),'m³');newChart('transportPie','doughnut',Object.keys(byTransport),Object.values(byTransport).map(x=>sumArr(x,'loadedM3')));newChart('sortPie','doughnut',Object.keys(bySort),Object.values(bySort).map(x=>sumArr(x,'loadedM3')))}
function summaryTable(arr){let rows=[];for(let [k,v] of Object.entries(group(arr,r=>`${r.channel} / ${r.region} / ${r.manager}`))){let a=agg(v);rows.push([k,a.orders,a.loadedM3,a.lateOrders,a.revenue,a.cash,a.bank,a.onTime])}rows.sort((a,b)=>b[2]-a[2]);return `<table><tr><th>Kesim</th><th>Order</th><th>Yuklangan m³</th><th>Kechikkan</th><th>Tushum</th><th>Naqd</th><th>Bank</th><th>On-time</th></tr>${rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${fmt(r[1])}</td><td>${fmtM3(r[2])}</td><td>${fmt(r[3])}</td><td>${money(r[4])}</td><td>${money(r[5])}</td><td>${money(r[6])}</td><td><span class="badge b-green">${pct(r[7])}</span></td></tr>`).join('')}</table>`}
function targetForManager(name){let custom=db.targets.find(t=>t.type==='manager'&&t.manager===name&&filters.from<=t.endDate&&filters.to>=t.startDate);return custom?+custom.targetM3:800}
function renderManagers(){let arr=visibleReports();let byM=group(arr,'manager');let rows=Object.entries(byM).map(([m,v])=>{let a=agg(v),target=targetForManager(m);let discipline=Math.min(100,Object.keys(group(v,'date')).length/Math.max(1,daysBetween(filters.from,filters.to))*100);let kpi=Math.min(100,(a.loadedM3/target*45)+(a.onTime*.25)+(discipline*.2)+((a.revenue>0?100:0)*.1));return {m,a,target,discipline,kpi}}).sort((x,y)=>y.a.loadedM3-x.a.loadedM3);managers.innerHTML=filterUI()+`<div class="grid two" style="margin-top:16px"><div class="card"><h3>Menejer KPI</h3><canvas id="mgrKpi"></canvas></div><div class="card"><h3>Menejer m³</h3><canvas id="mgrM3"></canvas></div></div><div class="card table-wrap" style="margin-top:16px"><h3>Menejerlar bo‘yicha to‘liq maʼlumot</h3><table><tr><th>Menejer</th><th>Order</th><th>m³</th><th>Tushum</th><th>Naqd</th><th>Bank</th><th>Kechikkan</th><th>On-time</th><th>Reja</th><th>KPI</th></tr>${rows.map(x=>`<tr><td><b>${esc(x.m)}</b></td><td>${fmt(x.a.orders)}</td><td>${fmtM3(x.a.loadedM3)}</td><td>${money(x.a.revenue)}</td><td>${money(x.a.cash)}</td><td>${money(x.a.bank)}</td><td>${fmt(x.a.lateOrders)}</td><td>${pct(x.a.onTime)}</td><td>${fmtM3(x.target)} m³<br><div class="progress"><span style="width:${Math.min(100,x.a.loadedM3/x.target*100)}%"></span></div></td><td><span class="badge ${x.kpi>=85?'b-green':x.kpi>=60?'b-orange':'b-red'}">${pct(x.kpi)}</span></td></tr>`).join('')}</table></div>`;newChart('mgrKpi','bar',rows.map(x=>x.m),rows.map(x=>x.kpi),'KPI');newChart('mgrM3','bar',rows.map(x=>x.m),rows.map(x=>x.a.loadedM3),'m³')}
function daysBetween(a,b){return Math.max(1,Math.round((new Date(b)-new Date(a))/86400000)+1)}
function renderFranchise(){let arr=visibleReports();let madad=arr.filter(r=>r.channel==='Madad'),hamkor=arr.filter(r=>r.channel==="Hamkor do'kon");let ma=agg(madad.filter(r=>r.region==='Andijon')),mf=agg(madad.filter(r=>r.region==="Farg'ona")),ha=agg(hamkor);let byDistrict=group(hamkor,'district'),byDealer=group(madad,'dealerCompany');franchise.innerHTML=filterUI()+`<div class="grid kpi" style="margin-top:16px">${kpi('Madad Andijon',fmtM3(ma.loadedM3)+' / 4000 m³',pct(ma.loadedM3/4000*100))}${kpi("Madad Farg'ona",fmtM3(mf.loadedM3)+' / 2000 m³',pct(mf.loadedM3/2000*100))}${kpi("Hamkor do'kon",fmtM3(ha.loadedM3)+' m³',money(ha.revenue))}${kpi('Hamkor do‘konlar',db.mapPoints.filter(p=>p.type.includes('Hamkor')).length+' ta','Karta bilan')}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Madad dealer kompaniyalari</h3><canvas id="dealerPie"></canvas></div><div class="card"><h3>Hamkor tumanlari</h3><canvas id="districtBar"></canvas></div></div><div class="card table-wrap" style="margin-top:16px"><h3>Franchise tafsilotlari</h3>${summaryTable([...madad,...hamkor])}</div>`;newChart('dealerPie','doughnut',Object.keys(byDealer),Object.values(byDealer).map(x=>sumArr(x,'loadedM3')));newChart('districtBar','bar',Object.keys(byDistrict),Object.values(byDistrict).map(x=>sumArr(x,'loadedM3')),'m³')}
function crmFiltered(){return db.crm.filter(x=>inRange(x.date||'2026-06-30'))}function crmSuccess(){let arr=crmFiltered().filter(x=>x.status==='Muvaffaqiyatli');return {count:arr.length,m3:sumArr(arr,'m3'),amount:sumArr(arr,'amount')}}
function renderCRM(){let arr=crmFiltered(),succ=arr.filter(x=>x.status==='Muvaffaqiyatli'),fail=arr.filter(x=>x.status==='Muvaffaqiyatsiz'),fu=arr.filter(x=>x.status==='Qayta aloqa');let conv=arr.length?succ.length/arr.length*100:0;crm.innerHTML=filterUI()+`<div class="grid kpi" style="margin-top:16px">${kpi('Jami lead',fmt(arr.length)+' ta','AmoCRM')}${kpi('Muvaffaqiyatli lead',fmt(succ.length)+' ta',pct(conv)+' conversion')}${kpi('Muvaffaqiyatli sotuv m³',fmtM3(sumArr(succ,'m3'))+' m³','CRM orqali')}${kpi('Muvaffaqiyatli summa',money(sumArr(succ,'amount')),'CRM sotuv')}${kpi('Muvaffaqiyatsiz',fmt(fail.length)+' ta',pct(arr.length?fail.length/arr.length*100:0))}${kpi('Qayta aloqa',fmt(fu.length)+' ta',pct(arr.length?fu.length/arr.length*100:0))}${kpi('O‘rtacha m³',fmtM3(succ.length?sumArr(succ,'m3')/succ.length:0)+' m³','successful lead')}${kpi('O‘rtacha summa',money(succ.length?sumArr(succ,'amount')/succ.length:0),'successful lead')}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>CRM status</h3><canvas id="crmStatus"></canvas></div><div class="card"><h3>Yo‘qotish sabablari</h3><canvas id="crmReasons"></canvas></div></div><div class="card table-wrap" style="margin-top:16px"><h3>CRM leadlar</h3><table><tr><th>Status</th><th>Ism</th><th>Telefon</th><th>m³</th><th>Summa</th><th>Sabab / Izoh</th></tr>${arr.map(x=>`<tr><td><span class="badge ${x.status==='Muvaffaqiyatli'?'b-green':x.status==='Qayta aloqa'?'b-blue':'b-red'}">${x.status}</span></td><td>${esc(x.name)}</td><td>${esc(x.phone)}</td><td>${fmtM3(x.m3)}</td><td>${money(x.amount)}</td><td>${esc(x.reason)}</td></tr>`).join('')}</table></div>`;newChart('crmStatus','doughnut',['Muvaffaqiyatli','Muvaffaqiyatsiz','Qayta aloqa'],[succ.length,fail.length,fu.length]);let gr=group(fail,'reason');newChart('crmReasons','bar',Object.keys(gr).slice(0,12),Object.values(gr).slice(0,12).map(x=>x.length),'Soni')}
function renderMap(){map.innerHTML=`<div class="card"><div class="toolbar"><button class="btn" onclick="locateMe()">📍 Mening joylashuvim</button><button class="btn light" onclick="fitMap()">Barchasini ko‘rsatish</button><button class="btn orange" onclick="openPointForm()">Nuqta qo‘shish</button></div><span class="hint"><span class="dot" style="background:#16a34a"></span>Hamkor do‘kon <span class="dot" style="background:#f09020"></span>Madad sklad</span></div><div class="map-box"><div id="mapCanvas"></div><div class="map-panel"><h3>B2C xarita</h3><p class="hint">Do‘konlar va Andijon/Farg‘ona sklad nuqtalarini bosing: masʼul inson va telefon ko‘rinadi.</p><b>${db.mapPoints.length}</b> ta nuqta</div></div>`;setTimeout(initMap,100)}
function initMap(){if(typeof L==='undefined'){mapCanvas.innerHTML='<div class="empty">Leaflet yuklanmadi. Internet ulanishini tekshiring.</div>';return}if(mapInstance)mapInstance.remove();mapInstance=L.map('mapCanvas').setView([41.05,71.65],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(mapInstance);mapLayer=L.featureGroup().addTo(mapInstance);db.mapPoints.forEach(p=>{if(!p.lat||!p.lng)return;let color=p.type&&p.type.includes('Madad')?'#f09020':'#16a34a';let icon=L.divIcon({className:'map-marker',html:`<span style="background:${color}">${p.type&&p.type.includes('Madad')?'S':'D'}</span>`,iconSize:[30,30],iconAnchor:[15,15]});L.marker([p.lat,p.lng],{icon}).bindPopup(`<b>${esc(p.name)}</b><br>${esc(p.type)} · ${esc(p.region)} ${esc(p.district||'')}<br><b>Masʼul:</b> ${esc(p.responsible||'-')}<br><b>Telefon:</b> <a href="tel:${esc(p.phone||'')}">${esc(p.phone||'-')}</a><br><span class="hint">${esc(p.status||'')}</span>`).addTo(mapLayer)});fitMap()}
function fitMap(){if(mapInstance&&mapLayer&&mapLayer.getLayers().length)mapInstance.fitBounds(mapLayer.getBounds().pad(.25))}
function locateMe(){if(!navigator.geolocation)return alert('GPS ishlamaydi');navigator.geolocation.getCurrentPosition(pos=>{let lat=pos.coords.latitude,lng=pos.coords.longitude;if(userMarker)userMarker.remove();userMarker=L.circleMarker([lat,lng],{radius:9,color:'#2563eb',fillColor:'#2563eb',fillOpacity:.9}).addTo(mapInstance).bindPopup('Sizning joylashuvingiz').openPopup();mapInstance.setView([lat,lng],15)},err=>alert('Lokatsiya aniqlanmadi. HTTPS yoki browser permissionni tekshiring.'),{enableHighAccuracy:true,timeout:15000})}
function openPointForm(){modalCard.innerHTML=`<h2>Yangi xarita nuqtasi</h2><form class="form-grid" onsubmit="savePoint(event)"><div class="field"><label>Nomi</label><input name="name" required></div><div class="field"><label>Tur</label><select name="type"><option>Hamkor do'kon</option><option>Madad sklad</option></select></div><div class="field"><label>Hudud</label><input name="region" required></div><div class="field"><label>Tuman</label><input name="district"></div><div class="field"><label>Masʼul</label><input name="responsible" required></div><div class="field"><label>Telefon</label><input name="phone" required></div><div class="field"><label>Latitude</label><input type="number" step="0.000001" name="lat" required></div><div class="field"><label>Longitude</label><input type="number" step="0.000001" name="lng" required></div><div class="field"><label>Status</label><input name="status" value="Faol"></div><div class="full"><button class="btn">Saqlash</button> <button type="button" class="btn light" onclick="closeModal()">Bekor qilish</button></div></form>`;modal.classList.add('show')}function savePoint(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries());d.id=uid();d.lat=+d.lat;d.lng=+d.lng;db.mapPoints.push(d);save();closeModal();renderMap()}function closeModal(){modal.classList.remove('show')}modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
function renderTasks(){let list=currentUser.role==='admin'?db.tasks:db.tasks.filter(t=>t.assignee===currentUser.name);let now=new Date();let overdue=list.filter(t=>t.status!=='Bajarildi'&&new Date(t.deadline)<now);tasks.innerHTML=`<div class="toolbar"><button class="btn" onclick="openTaskForm()">Vazifa qo‘shish</button><button class="btn light" onclick="checkTaskNotifications()">Deadline tekshirish</button></div><div class="grid kpi">${kpi('Jami vazifa',list.length+' ta','Tanlangan user')}${kpi('Kechikkan',overdue.length+' ta','Deadline o‘tgan')}${kpi('Bajarildi',list.filter(t=>t.status==='Bajarildi').length+' ta','Yopilgan')}${kpi('Jarayonda',list.filter(t=>t.status!=='Bajarildi').length+' ta','Ochiq')}</div><div class="card table-wrap" style="margin-top:16px"><table><tr><th>Vazifa</th><th>Kimga</th><th>Deadline</th><th>Status</th><th></th></tr>${list.map(t=>`<tr><td>${esc(t.title)}</td><td>${esc(t.assignee)}</td><td>${t.deadline}</td><td><span class="badge ${t.status==='Bajarildi'?'b-green':new Date(t.deadline)<now?'b-red':'b-blue'}">${t.status}</span></td><td><button class="btn small green" onclick="completeTask('${t.id}')">Bajarildi</button></td></tr>`).join('')}</table></div>`;checkTaskNotifications(false)}
function openTaskForm(){let users=db.users.filter(u=>u.role!=='admin');modalCard.innerHTML=`<h2>Vazifa qo‘shish</h2><form class="form-grid" onsubmit="saveTask(event)"><div class="field full"><label>Vazifa</label><input name="title" required></div><div class="field"><label>Menejer</label><select name="assignee">${users.map(u=>`<option>${u.name}</option>`).join('')}</select></div><div class="field"><label>Deadline sana</label><input type="datetime-local" name="deadline" required></div><div class="field"><label>Muhimlik</label><select name="priority"><option>Yuqori</option><option>O‘rta</option><option>Past</option></select></div><div class="full"><button class="btn">Saqlash</button> <button type="button" class="btn light" onclick="closeModal()">Bekor qilish</button></div></form>`;modal.classList.add('show')}function saveTask(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries());d.id=uid();d.status='Yangi';d.createdAt=new Date().toISOString();db.tasks.push(d);notify('Yangi vazifa',`${d.assignee} uchun vazifa: ${d.title}`);save();closeModal();renderTasks()}function completeTask(id){let t=db.tasks.find(x=>x.id===id);if(t){t.status='Bajarildi';t.completedAt=new Date().toISOString();notify('Vazifa bajarildi',`${t.assignee} vazifani bajardi: ${t.title}`);save();renderTasks()}}function checkTaskNotifications(show=true){let now=new Date();db.tasks.forEach(t=>{if(t.status!=='Bajarildi'&&new Date(t.deadline)<now&&!t.overdueNotified){t.overdueNotified=true;notify('Vazifa kechikdi',`${t.assignee} deadline ichida bajarmadi: ${t.title}`)}});save();if(show)alert('Deadline tekshirildi')}function notify(title,text){db.notifications=db.notifications||[];db.notifications.unshift({id:uid(),date:new Date().toISOString(),title,text})}
function renderSettings(){settings.innerHTML=`<div class="grid two"><div class="card"><h3>JSON Backup / Restore</h3><div class="toolbar"><button class="btn" onclick="exportJSON()">JSON yuklab olish</button><label class="btn light">JSON yuklash<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label><button class="btn orange" onclick="resetData()">Ichki bazani qayta yuklash</button></div><p class="hint">SAP yoki ChatGPT orqali tayyorlangan JSONni shu yerga yuklash mumkin.</p></div><div class="card"><h3>Bildirishnomalar</h3><div>${(db.notifications||[]).slice(0,10).map(n=>`<div style="border-bottom:1px solid var(--line);padding:8px 0"><b>${esc(n.title)}</b><br><span class="hint">${esc(n.text)} · ${new Date(n.date).toLocaleString('ru-RU')}</span></div>`).join('')||'<p class="hint">Bildirishnoma yo‘q.</p>'}</div></div></div><div class="card table-wrap" style="margin-top:16px"><h3>Foydalanuvchilar</h3><table><tr><th>Login</th><th>Ism</th><th>Rol</th></tr>${db.users.map(u=>`<tr><td>${u.login}</td><td>${u.name}</td><td>${u.role}</td></tr>`).join('')}</table></div>`}
function exportJSON(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='megaton_b2c_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();notify('JSON export','Backup yuklab olindi');save()}function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(confirm('JSON import qilinsinmi? Merge emas, replace bo‘ladi.')){db=data;save();notify('JSON import','Maʼlumot import qilindi');render(activePage())}}catch(err){alert('JSON xato: '+err.message)}};r.readAsText(f)}
</script>
</body>
